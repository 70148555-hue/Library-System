<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Smart Study Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
</head>
<body class="bg-white dark:bg-gray-900 transition-colors duration-300">

    <nav class="bg-blue-600 border-gray-200 dark:bg-gray-800 sticky top-0 z-40">
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
            <a href="../../index.html" class="flex items-center space-x-3 text-white">
                <span class="self-center text-2xl font-semibold whitespace-nowrap">Smart Study Hub</span>
            </a>
            <div class="hidden w-full md:flex md:w-auto">
                <ul class="flex flex-row space-x-8 text-white font-medium">
                    <li><a href="../../index.html" class="hover:text-blue-200">Home</a></li>
                    <li><a href="about.html" class="hover:text-blue-200">About</a></li>
                    <li><a href="#" class="text-blue-200 underline">Contact</a></li>
                    <li><a href="../../account/signin.html" class="hover:text-blue-200">Sign In</a></li>
                    <li><a href="../../account/signup.html" class="hover:text-blue-200">Sign Un</a></li>
                </ul>
            </div>
            <button id="themeToggle" class="text-white p-2 rounded-lg hover:bg-blue-700 dark:hover:bg-gray-700">🌙</button>
        </div>
    </nav>

    <section class="bg-white dark:bg-gray-900">
      <div class="py-8 lg:py-16 px-4 mx-auto max-w-screen-md">
          <h2 class="mb-4 text-4xl tracking-tight font-extrabold text-center text-gray-900 dark:text-white">Contact Us</h2>
          <p class="mb-8 lg:mb-16 font-light text-center text-gray-500 dark:text-gray-400 sm:text-xl">Got a technical issue? Need help with the Library Inventory? Let us know.</p>
          
          <form action="https://formspree.io/f/mnjobaga" method="POST">
  <div>
    <label for="email">Your email</label>
    <input 
      type="email" 
      id="email" 
      name="email" 
      placeholder="name@uol.edu.pk" 
      required>
  </div>

  <div>
    <label for="subject">Subject</label>
    <input 
      type="text" 
      id="subject" 
      name="subject" 
      placeholder="Let us know how we can help you" 
      required>
  </div>

  <div>
    <label for="message">Your message</label>
    <textarea 
      id="message" 
      name="message" 
      rows="6" 
      placeholder="Leave a comment..." 
      required></textarea>
  </div>

  <button type="submit">Send message</button>
</form>
      </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <script type="module" src="../../theme.js"></script>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            // String Method Implementation for Task 6
            const formattedEmail = email.trim().toLowerCase();
            alert(`Thank you! We will contact you at ${formattedEmail}`);
            this.reset();
        });
    </script>
    <footer class="p-4 bg-white md:p-8 lg:p-10 dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700">
  <div class="mx-auto max-w-screen-xl text-center">
      <a href="../../index.html" class="flex justify-center items-center text-2xl font-semibold text-gray-900 dark:text-white">
          <img src="../../assets/logos/logo.png" class="h-8 mr-3 rounded" alt="Logo">
          Smart Study Hub    
      </a>
      <p class="my-6 text-gray-500 dark:text-gray-400">The University of Lahore - Web Engineering Assignment 02.</p>
      <ul class="flex flex-wrap justify-center items-center mb-6 text-gray-900 dark:text-white">
          <li><a href="../../index.html" class="mr-4 hover:underline md:mr-6">Home</a></li>
          <li><a href="about.html" class="mr-4 hover:underline md:mr-6">About</a></li>
          <li><a href="../../account/signup.html" class="mr-4 hover:underline md:mr-6">Sign Up</a></li>
      </ul>
      <span class="text-sm text-gray-500 sm:text-center dark:text-gray-400">© 2026 Smart Study Hub™.</span>
  </div>
</footer>
</body>
</html>
