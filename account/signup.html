<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | Library Inventory System</title>
<link rel="icon" type="image/jpg" href="assets/fulllogo.jpg">
<style>
/* --- GENERAL BODY & THEME --- */
body {
  font-family: 'Tahoma', sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: #fff;
  transition: all 0.5s ease;
}
body.light-mode { background: #fdfdfd; color: #333; }
body.light-mode nav { background: #4a90e2; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
body.light-mode nav a { color: #fff; }
body.light-mode .signup-form { background: rgba(255,255,255,0.95); color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.1);}
body.dark-mode { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
body.dark-mode nav { background: rgba(0,0,0,0.7); }
body.dark-mode nav a { color: #fff; }
body.dark-mode .signup-form { background: rgba(30,30,40,0.8); color: #fff; }

/* --- NAVIGATION --- */
nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); flex-wrap: wrap; transition: all 0.3s ease;}
.nav-left { display:flex; align-items:center; gap:10px;}
.logo { width:50px; height:50px; border-radius:10px;}
nav a { color:white; text-decoration:none; margin-left:10px; padding:5px 10px; border-radius:8px; transition: all 0.3s ease;}
nav a:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.4);}
.theme-btn { font-size:1.2rem; background:none; border:none; cursor:pointer; color:white; margin-left:10px; transition: all 0.3s ease;}

/* --- HERO --- */
.hero { text-align:center; padding:40px 20px;}
.hero h1 { font-size:3rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.3);}
.hero p { font-size:1.2rem; margin-top:10px; color:#f0f0f0;}

/* --- SIGN UP FORM --- */
.signup-form { max-width:500px; margin:30px auto; padding:30px; border-radius:20px; backdrop-filter: blur(10px); text-align:center;}
.signup-form h2 { margin-bottom:20px; }
.signup-form input { width:90%; padding:12px; margin:10px 0; border-radius:10px; border:none; }
.signup-form button { padding:10px 20px; border-radius:12px; border:none; background: linear-gradient(45deg,#36d1dc,#5b86e5); color:white; cursor:pointer; transition: all 0.3s ease; }
.signup-form button:hover { transform:scale(1.05); box-shadow:0 8px 25px rgba(0,0,0,0.5); }

/* --- RESPONSIVE --- */
@media(max-width:768px){ nav{flex-direction:column; align-items:flex-start;} .signup-form input{width:95%;} }
</style>
</head>
<body class="light-mode">

<nav>
  <div class="nav-left">
    <img src="../assets/logos/LOGO.png" alt="Logo" class="logo">
    <span class="brand">Library Inventory</span>
  </div>
  <div class="nav-right">
    <a href="../index.html">Home</a>
    <a href="../src/pages/about.html">About</a>
    <a href="../src/pages/contact.html">Contact</a>
    <a href="signin.html">Sign In</a>
    <a href="signup.html">Sign Up</a>
    <button id="themeToggle" class="theme-btn">🌙</button>
  </div>
</nav>

<header class="hero">
  <h1>Sign Up</h1>
  <p>Create your account to manage library inventory</p>
</header>

<section class="signup-form">
  <h2>Create an Account</h2>
  <form id="signupForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
    <button type="submit">Sign Up</button>
  </form>
</section>

<script>
document.addEventListener("DOMContentLoaded", function(){
  const body=document.body;
  const themeBtn=document.getElementById("themeToggle");
  themeBtn.addEventListener("click", ()=>{
    if(body.classList.contains("light-mode")){
      body.classList.replace("light-mode","dark-mode"); themeBtn.textContent="☀️";
    }else{
      body.classList.replace("dark-mode","light-mode"); themeBtn.textContent="🌙";
    }
  });

  // Simple sign-up simulation
  document.getElementById("signupForm").addEventListener("submit", function(e){
    e.preventDefault();
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
      alert("Passwords do not match!");
      return;
    }
    alert(`Welcome, ${name}! Your account has been created.`);
    this.reset();
  });
});
</script>
</body>
</html>
